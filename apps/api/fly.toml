# Fly.io deployment config for the Sentinel API.
#
# Postgres is provisioned on Neon (via the Vercel Marketplace integration),
# not Fly's unmanaged Postgres — Neon's free tier is always-on, whereas
# Fly's free-tier Postgres machines auto-suspend on idle.
#
# Deploy from the repo root with:
#   fly launch --copy-config --no-deploy --config apps/api/fly.toml
#   fly secrets set JWT_SECRET_KEY="$(openssl rand -hex 32)" \
#                   DATABASE_URL="postgresql+psycopg://<neon-conn-string>" \
#                   CORS_ORIGINS="https://<your-vercel-domain>"
#   fly deploy --config apps/api/fly.toml --dockerfile apps/api/Dockerfile

app = "sentinel-ops-api"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  LOG_LEVEL = "INFO"
  SIMULATOR_ENABLED = "true"
  SIMULATOR_INTERVAL_SECONDS = "8"
  # CORS_ORIGINS, JWT_SECRET_KEY, DATABASE_URL, OPENAI_API_KEY are set as secrets.

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # Keep WebSocket connections from being idle-killed too aggressively.
  [http_service.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
